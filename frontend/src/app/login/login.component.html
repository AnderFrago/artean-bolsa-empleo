<div class="container">
    <div class="row">
        <h3 class="display-3">Acceder</h3>
    </div>
    <div class="row">
        <div class="col-12 mx-auto">

            <div class="jumbotron bg-transparent text-center">
                <div *ngIf="!user" class="card text-center">
                  <h6 class="card-header">
                    Acceder con Artean
                  </h6>
                  <div class="card-block">
                    <form [formGroup]="form">
                        <fieldset class="form-group">
                            <!-- <legend>Acceder</legend> -->
                            <div class="continer">
                                <div class="row my-2">
                                    <div class="col-2 d-flex justify-content-end">
                                        <label class="form-text text-muted ">Nombre de usuario:</label>
                                    </div>
                                    <div class="col-6">
                                        <input name="username" 
                                        formControlName="username" class="form-control">
                                    </div>
                                </div>
                                <div class="row my-2">
                                    <div class="col-2  d-flex justify-content-end">
                                        <label class="form-text text-muted">Contraseña:</label>
                                    </div>
                                    <div class="col-6">
                                        <input name="password"
                                        formControlName="password" type="password" class="form-control">
                                    </div>
                                </div>
                            </div>
                        </fieldset>
                        <div class="form-buttons ml-auto my-2">
                            <div *ngIf="isFormSubmitted">
                                <mat-spinner></mat-spinner>
                            </div>
                            <div *ngIf="!isFormSubmitted">
                                <button class="btn btn-primary" (click)="login()"
                                [disabled]=" this.form.status == 'INVALID'">Aceptar</button>
                            </div>
                        </div>
                    </form>
            
                  </div>
                </div>
              </div>
            
        </div>
    </div>
    <div class="row">
        <div class="col-12 mx-auto">

            <div class="jumbotron bg-transparent text-center">
                <div *ngIf="!user" class="card text-center">
                  <h6 class="card-header">
                    Acceder con Google
                  </h6>
                  <div class="card-block my-2">
                    <button class="btn btn-primary btn-social-icon btn-google mx-1" (click)="signInWithGoogle()"><span class="fab fa-google"></span></button>
                  </div>
                </div>
                <!-- <div *ngIf="user" class="card text-center">
                  <div class="card-block"></div>
                  <img *ngIf="user.photoUrl" class="card-img-top img-responsive photo" src="{{ user.photoUrl }}">
                  <div class="card-block">
                    <h4 class="card-title">{{ user.name }}</h4>
                    <p class="card-text">{{ user.email }}</p>
                    <p class="card-text">Logged in with {{ user.provider }}</p>
                  </div>
                  <div class="card-block">
                    <button class="btn btn-danger" (click)="signOut()">Sign out</button>
                  </div>
        
                </div> -->
              </div>

        </div>
    </div>
</div>
